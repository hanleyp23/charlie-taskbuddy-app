<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/style.css">
  <title>Sign In | Task Buddy</title>
</head>

<body class="taskbuddy-page">
  <main class="container login-layout">
    <section class="login-panel">
      <div class="taskbuddy-logo">TaskBuddy</div>
      <i class="bi bi-clipboard-check login-icon"></i>

      <form id="loginForm" class="login-form">
        <div class="mb-3">
          <label for="userBox" class="form-label">Username</label>
          <input id="userBox" class="form-control" type="text" required>
        </div>

        <div class="mb-3">
          <label for="passBox" class="form-label">Password</label>
          <input id="passBox" class="form-control" type="password" required>
        </div>

        <button class="btn taskbuddy-button w-100" type="submit">Sign In</button>
       <p id="authMsg" class="small text-center mt-3 mb-0">
          Enter your username and password.
       </p>
      </form>

      <p class="login-description">
        Meet TaskBuddy, your favorite app for staying on top of school,
        work, and personal responsibilities.
      </p>
    </section>
  </main>

  <script src="../assets/js/auth-guard.js"></script>
  <script src="../assets/js/auth.js"></script>
</body>

</html>
