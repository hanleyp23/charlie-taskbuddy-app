<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskBuddy | GitHub Gist</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="../index.html">
          <i class="bi bi-clipboard-check"></i>
          TaskBuddy
        </a>

        <div class="ms-auto d-flex gap-2">
          <a class="btn btn-outline-secondary btn-sm" href="../index.html">
            Back to Tasks
          </a>

          <a class="btn btn-outline-primary btn-sm" href="admin.html">
            Admin
          </a>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="row g-4">
        <div class="col-lg-6">
          <div class="card border-0 shadow-sm rounded-4 h-100">
            <div class="card-body p-4">
              <h1 class="h2 mb-4">Send Tasks to GitHub Gist</h1>

              <p>
                <a
                  href="https://gist.github.com/hanleyp23/37f3f98f077f1acd5b87c692149c94ea"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  View TaskBuddy Gist
                </a>
              </p>

              <form id="gist-form" novalidate>
                <div class="mb-3">
                  <label class="form-label" for="gist-id">
                    Existing Gist ID
                  </label>

                  <input
                    class="form-control"
                    id="gist-id"
                    type="text"
                    autocomplete="off"
                    value="37f3f98f077f1acd5b87c692149c94ea"
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label" for="github-token">
                    GitHub Personal Access Token
                  </label>

                  <input
                    class="form-control"
                    id="github-token"
                    type="password"
                    autocomplete="off"
                    placeholder="Paste your token here"
                  />
                </div>

                <div
                  id="gist-message"
                  class="alert d-none"
                  role="alert"
                ></div>

                <button class="btn btn-primary" type="submit">
                  <i class="bi bi-chat-left-text me-2"></i>
                  Add JSON as Gist Comment
                </button>
              </form>
            </div>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="card border-0 shadow-sm rounded-4 h-100">
            <div class="card-body p-4 d-flex flex-column">
              <h2 class="h4 mb-3">JSON Ready to Send</h2>

              <pre
                id="gist-data-output"
                class="code-panel flex-grow-1"
              ><code>Looking for saved task data...</code></pre>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/gist.js"></script>
  </body>
</html>
